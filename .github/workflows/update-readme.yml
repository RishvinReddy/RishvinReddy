name: Update Profile Metrics

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - ".github/workflows/update-readme.yml"

concurrency:
  group: profile-readme-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update README with Dynamic Content
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: |
          python today.py
          python scripts/generate_about.py
          python scripts/generate_tech_stack.py
          python scripts/generate_profile_cards.py
          python scripts/generate_footer.py
          python scripts/update_projects.py
          python scripts/fetch_analytics.py

      - name: Commit changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md dark_mode.svg light_mode.svg cache/stats.json assets/projects/ assets/analytics/
          if git diff --cached --quiet; then
            echo "No profile changes detected."
            exit 0
          fi
          git commit -m "chore(profile): refresh dynamic profile assets"
          git push
