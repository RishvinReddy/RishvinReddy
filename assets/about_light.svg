<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-opacity="0.04" flood-color="#000000" />
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="700" fill="#F7F7F8" />
  
  <!-- Profile Container -->
  <rect x="40" y="20" width="720" height="660" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)" />

  <g transform="translate(90, 60)">
    <!-- Header -->
    <text x="0" y="0" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="bold" fill="#2C5282" letter-spacing="1.5">✦ ABOUT ME</text>
    <text x="620" y="0" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="bold" fill="#2C5282" letter-spacing="1.5" text-anchor="end">01 / PROFILE</text>
    
    <line x1="0" y1="15" x2="620" y2="15" stroke="#E2E8F0" stroke-width="1" />
    
    <!-- Title Section -->
    <text x="0" y="65" font-family="Georgia, serif" font-size="40" font-weight="bold" fill="#1A202C" letter-spacing="-0.5">Erolla Rishvin Reddy</text>
    <text x="0" y="95" font-family="'Times New Roman', Times, serif" font-style="italic" font-size="18" fill="#4A5568">Computer Science &amp; Engineering · Class of 2028</text>
    <text x="0" y="120" font-family="'Times New Roman', Times, serif" font-style="italic" font-size="18" fill="#4A5568">Woxsen University</text>
    
    <!-- Specialization -->
    <text x="0" y="170" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#1A202C" letter-spacing="2">SPECIALIZATION</text>
    
    <g transform="translate(0, 190)">
      <rect x="0" y="0" width="105" height="28" rx="2" fill="#EBF8FF" fill-opacity="0.1" stroke="#2C5282" stroke-width="1"/>
      <text x="52.5" y="18" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="bold" fill="#2C5282" text-anchor="middle">BLOCKCHAIN</text>
      
      <rect x="115" y="0" width="55" height="28" rx="2" fill="#EBF8FF" fill-opacity="0.1" stroke="#2C5282" stroke-width="1"/>
      <text x="142.5" y="18" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="bold" fill="#2C5282" text-anchor="middle">IoT</text>
      
      <rect x="180" y="0" width="135" height="28" rx="2" fill="#EBF8FF" fill-opacity="0.1" stroke="#2C5282" stroke-width="1"/>
      <text x="247.5" y="18" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="bold" fill="#2C5282" text-anchor="middle">CYBERSECURITY</text>
    </g>
    
    <!-- Bio Paragraph -->
    <text x="0" y="260" font-family="'Times New Roman', Times, serif" font-size="18" font-weight="400" fill="#1A202C">I build across the hardware-to-software spectrum — from embedded prototypes</text>
    <text x="0" y="285" font-family="'Times New Roman', Times, serif" font-size="18" font-weight="400" fill="#1A202C">and sensor-driven automation to backend systems, web applications, security</text>
    <text x="0" y="310" font-family="'Times New Roman', Times, serif" font-size="18" font-weight="400" fill="#1A202C">tooling, and blockchain-oriented engineering projects.</text>
    
    <!-- Engineering Focus -->
    <text x="0" y="365" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#1A202C" letter-spacing="2">ENGINEERING FOCUS</text>
    
    
        <rect x="0" y="385" width="300" height="70" rx="4" fill="#FAFAFA" stroke="#E2E8F0" stroke-width="1" />
        <text x="20" y="413" font-family="'Courier New', Courier, monospace" font-size="16" font-weight="bold" fill="#2C5282">01</text>
        <text x="50" y="413" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#1A202C">Cybersecurity</text>
        <text x="50" y="435" font-family="'Times New Roman', Times, serif" font-size="15" fill="#4A5568">Network Security &amp; Tools</text>
        
    
        <rect x="320" y="385" width="300" height="70" rx="4" fill="#FAFAFA" stroke="#E2E8F0" stroke-width="1" />
        <text x="340" y="413" font-family="'Courier New', Courier, monospace" font-size="16" font-weight="bold" fill="#2C5282">02</text>
        <text x="370" y="413" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#1A202C">IoT / Embedded</text>
        <text x="370" y="435" font-family="'Times New Roman', Times, serif" font-size="15" fill="#4A5568">Sensor Systems &amp; Automation</text>
        
    
        <rect x="0" y="470" width="300" height="70" rx="4" fill="#FAFAFA" stroke="#E2E8F0" stroke-width="1" />
        <text x="20" y="498" font-family="'Courier New', Courier, monospace" font-size="16" font-weight="bold" fill="#2C5282">03</text>
        <text x="50" y="498" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#1A202C">Blockchain</text>
        <text x="50" y="520" font-family="'Times New Roman', Times, serif" font-size="15" fill="#4A5568">Applied Decentralized Systems</text>
        
    
        <rect x="320" y="470" width="300" height="70" rx="4" fill="#FAFAFA" stroke="#E2E8F0" stroke-width="1" />
        <text x="340" y="498" font-family="'Courier New', Courier, monospace" font-size="16" font-weight="bold" fill="#2C5282">04</text>
        <text x="370" y="498" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#1A202C">Full-Stack</text>
        <text x="370" y="520" font-family="'Times New Roman', Times, serif" font-size="15" fill="#4A5568">Backend Systems &amp; APIs</text>
        
    
    <!-- Quote -->
    <line x1="0" y1="565" x2="0" y2="605" stroke="#2C5282" stroke-width="4" />
    <text x="20" y="582" font-family="'Times New Roman', Times, serif" font-style="italic" font-size="20" fill="#1A202C">"I do not just write code.</text>
    <text x="20" y="605" font-family="Georgia, serif" font-weight="bold" font-size="20" fill="#1A202C">I design systems that solve real problems."</text>
